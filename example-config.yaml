# Example configuration for Mail and Packages Custom Card
# This example shows all available configuration options
# with the correct sensor names from the Mail and Packages integration (v1.0.0+)

# Minimal configuration (required fields only)
type: 'custom:mail-and-packages-card'
name: Mail Summary
updated: sensor.mail_updated  # Required

# Full configuration with all optional sensors
type: 'custom:mail-and-packages-card'
name: Mail and Packages Summary
details: true  # Show details section (default: true)
image: true    # Show USPS mail image (default: true)
camera: false  # Show camera entity (default: true)

# Required sensor
updated: sensor.mail_updated

# Aggregate sensors (show total counts across all carriers)
packages_delivered: sensor.mail_packages_delivered
packages_in_transit: sensor.mail_packages_in_transit

# Individual carrier package sensors
usps_packages: sensor.mail_usps_packages
ups_packages: sensor.mail_ups_packages
fedex_packages: sensor.mail_fedex_packages
amazon_packages: sensor.mail_amazon_packages

# USPS mail sensor (mail pieces count)
usps_mail: sensor.mail_usps_mail

# USPS mail image display (choose ONE of these options):
# Option 1: Use the image URL sensor (RECOMMENDED)
gif_sensor: sensor.mail_image_url

# Option 2: Use the camera entity (alternative to gif_sensor)
# camera_entity: camera.mail_usps_camera

# Optional: Custom delivery message template sensor
# You must create this template sensor yourself
# deliveries_message: sensor.mail_deliveries

# Notes:
# 1. All sensors listed above are created by the Mail and Packages integration v1.0.0+
# 2. The gif_sensor should point to sensor.mail_image_url (contains the image URL)
# 3. Image files use random names for security - no manual path configuration needed
# 4. The deliveries_message sensor is NOT created by the integration
# 5. Only include sensors you have enabled in the integration configuration
